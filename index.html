<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커리어 내비게이터</title>
    <!-- 구글 폰트 적용 (현대적이고 세련된 느낌의 Noto Sans KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* 밝고 세련된 라이트 그레이 테마 */
            --bg-gradient-start: #f8fafc;
            --bg-gradient-end: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.8);
            --primary-text: #1e293b;
            --secondary-text: #64748b;
            --accent-glow: rgba(59, 130, 246, 0.1);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            overflow: hidden;
            color: var(--primary-text);
        }

        /* 중앙 컨테이너 - 밝은 배경에 어울리는 소프트 글래스모피즘 */
        .container {
            text-align: center;
            padding: 4rem 6rem;
            border-radius: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            box-shadow: 
                0 10px 25px -5px rgba(0, 0, 0, 0.05),
                0 20px 50px -12px rgba(0, 0, 0, 0.1);
            
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--primary-text);
            /* 부드러운 가독성을 위한 텍스트 디자인 */
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            cursor: default;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        h1:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
        }

        p.subtext {
            margin-top: 1.5rem;
            font-size: 1.15rem;
            color: var(--secondary-text);
            font-weight: 500;
            letter-spacing: -0.01em;
            opacity: 0;
            animation: fadeIn 1.5s ease 0.8s forwards;
        }

        /* 배경 장식용 블롭 - 밝은 배경에 어울리는 부드러운 파스텔 톤 */
        .blob {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #dbeafe 0%, #bfdbfe 100%);
            top: -200px;
            left: -150px;
            border-radius: 45% 55% 70% 30% / 30% 40% 60% 70%;
        }

        .blob-2 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, #f1f5f9 0%, #e2e8f0 100%);
            bottom: -300px;
            right: -200px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation-delay: -10s;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(30px, 50px) rotate(5deg) scale(1.05); }
            66% { transform: translate(-20px, 20px) rotate(-5deg) scale(0.95); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        /* 버튼 스타일 업그레이드 */
        .btn-container {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1.5s ease 1s forwards;
        }

        .primary-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }

        .primary-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .primary-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 버튼 색상Variation */
        .primary-btn.btn-blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .primary-btn.btn-blue:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
        }

        .primary-btn.btn-yellow {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3);
        }
        .primary-btn.btn-yellow:hover {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 20px 25px -5px rgba(245, 158, 11, 0.4);
        }

        .primary-btn.btn-orange {
            background: linear-gradient(135deg, #fb923c 0%, #f97316 100%);
            box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3);
        }
        .primary-btn.btn-orange:hover {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            box-shadow: 0 20px 25px -5px rgba(249, 115, 22, 0.4);
        }

        .primary-btn.btn-green {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.3);
        }
        .primary-btn.btn-green:hover {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.4);
        }

        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .container { padding: 3rem 2rem; margin: 0 1.5rem; }
            p.subtext { font-size: 1rem; }
            .primary-btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container">
        <!-- 메인 타이틀 한 줄로 표시 -->
        <h1 id="mainTitle">커리어 내비게이터</h1>
        <p class="subtext">환영합니다. 당신의 상상력을 펼쳐보세요</p>
        <div class="btn-container">
            <button class="primary-btn" onclick="nextSentence()">다음 문장 보기</button>
        </div>
    </div>

    <script>
        const sentences = [
            "커리어 내비게이터",
            "경영 재무 대시보드",
            "AI 브랜드 매니저",
            "AI 학생 카운슬러"
        ];
        const colors = ["btn-blue", "btn-yellow", "btn-orange", "btn-green"];
        let currentIndex = 0; // 초기 상태: 커리어 내비게이터 (index 0)

        function nextSentence() {
            const titleElement = document.getElementById('mainTitle');
            const btnElement = document.querySelector('.primary-btn');
            
            // 인덱스 순환 (0 -> 1 -> 2 -> 3 -> 0)
            currentIndex = (currentIndex + 1) % sentences.length;
            
            // 텍스트 변경 전 애니메이션 초기화
            titleElement.style.animation = 'none';
            titleElement.offsetHeight; // Reflow
            
            // 텍스트 교체
            titleElement.textContent = sentences[currentIndex];
            
            // 버튼 색상 교체
            btnElement.classList.remove("btn-blue", "btn-yellow", "btn-orange", "btn-green");
            btnElement.classList.add(colors[currentIndex]);
            
            // 애니메이션 다시 적용
            titleElement.style.animation = 'fadeIn 0.8s ease forwards';
        }
    </script>
</body>

</html>
